# Named regions for Phase 1 discovery and Phase 7 expansion.
#
# A region can be defined 3 ways:
#
# 1. Explicit zip list:
#      region_name:
#        - 90045
#        - 90066
#
# 2. By city (resolves to all zips in that city):
#      region_name:
#        city: Los Angeles
#        state: CA
#
# 3. By radius around a center zip:
#      region_name:
#        center_zip: 90045
#        radius_miles: 25
#
# Add as many regions as you want. Names are free-form.

LA_City:
  city: Los Angeles
  state: CA

LA_County:
  center_zip: 90045
  radius_miles: 30

